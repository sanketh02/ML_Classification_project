# This file defines GitHub Actions CI/CD pipeline

name: CI/CD Pipeline

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: 12345
          MYSQL_DATABASE: shopper_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -p12345"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: 12345
          POSTGRES_DB: shoppers_warehouse
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for databases
        run: |
          sleep 15

      - name: Setup database and train model
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: 12345
          DB_NAME: shopper_db

          PG_HOST: 127.0.0.1
          PG_PORT: 5432
          PG_USER: postgres
          PG_PASSWORD: 12345
          PG_NAME: shoppers_warehouse

          MLFLOW_TRACKING_URI: ./mlruns
          MODEL_PATH: ./src/model.pkl

        run: |
          python data/reload_data.py
          python ETL/load.py
          python src/train.py

      - name: Run pytest
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: 12345
          DB_NAME: shopper_db

          PG_HOST: 127.0.0.1
          PG_PORT: 5432
          PG_USER: postgres
          PG_PASSWORD: 12345
          PG_NAME: shoppers_warehouse

          MLFLOW_TRACKING_URI: ./mlruns
          MODEL_PATH: ./src/model.pkl

        run: |
          pytest tests/test_api.py -v

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/shoppers-ml:latest